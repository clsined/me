name: Deploy to GitHub Pages

on:
  push:
    branches: [main]   # adapte si ta branche s'appelle "master"
  workflow_dispatch:    # permet aussi un lancement manuel

permissions:
  contents: read
  pages: write
  id-token: write

# Évite les déploiements concurrents
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public   # on publie uniquement le dossier public/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
