name: Deploy to GitHub Pages

on:
  push:
    branches: [main]   # adapte si ta branche s'appelle "master"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  administration: write   # nécessaire pour l'auto-activation de Pages

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # active Pages automatiquement (corrige le "Not Found")

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4